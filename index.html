ble-wrapper">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Nama Item</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Status Stok</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="adminTableBody">
              <!-- Baris tabel akan di-render secara dinamis menggunakan JavaScript -->
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer>
      <div class="footer-bottom">
        <p>&copy; 2026 NOKAT Cafe. All Rights Reserved. Crafted with passion.</p>
        <div class="footer-admin-trigger" onclick="promptAdminLogin()">
          🔒 Staff Only
        </div>
      </div>
    </footer>

    <!-- Lightbox Modal untuk Gallery -->
    <div class="lightbox" id="galleryLightbox" onclick="closeLightbox()">
      <span class="lightbox-close">&times;</span>
      <img class="lightbox-content" id="lightboxImg" alt="Enlarged view" />
    </div>

    <!-- JavaScript Integrasi Logika Aplikasi -->
    <script>
      // Data Menu / Produk (State Utama)
      const menuData = [
        { id: 1, name: 'Kopi Susu Nokat', category: 'coffee', price: 25000, available: true },
        { id: 2, name: 'Premium Matcha', category: 'non-coffee', price: 28000, available: true },
        { id: 3, name: 'Butter Croissant', category: 'pastry', price: 22000, available: true },
        { id: 4, name: 'Americano Double Shot', category: 'coffee', price: 20000, available: false }
      ];

      // State Penjualan untuk Admin Dashboard (Simulasi Sesi)
      let totalSoldItems = 0;
      let totalRevenue = 0;
      let isAdminLoggedIn = false;

      // Fungsi Navigasi Tab / Pindah Halaman Berbasis SPA
      function switchTab(tabId) {
        // Ambil semua elemen section
        const sections = document.querySelectorAll('.section-container');
        sections.forEach(section => {
          section.classList.remove('active');
        });

        // Aktifkan section yang dipilih
        const targetSection = document.getElementById(tabId);
        if (targetSection) {
          targetSection.classList.add('active');
        }

        // Perbarui status aktif pada tombol navigasi desktop
        const navButtons = document.querySelectorAll('.nav-tab');
        navButtons.forEach(btn => {
          btn.classList.remove('active');
          // Jika teks tombol cocok dengan id tab (atau tombol khusus admin)
          if (btn.textContent.trim().toLowerCase() === tabId || (tabId === 'admin' && btn.id === 'adminNavTab')) {
            btn.classList.add('active');
          }
        });

        // Tutup menu mobile otomatis setelah navigasi (jika terbuka)
        const navTabsContainer = document.getElementById('mainNav');
        if (navTabsContainer.classList.contains('mobile-active')) {
          navTabsContainer.classList.remove('mobile-active');
        }

        // Scroll ke atas otomatis demi kenyamanan UX
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      // Toggle Menu Hamburger di Layar Mobile
      function toggleMobileMenu() {
        const navTabsContainer = document.getElementById('mainNav');
        navTabsContainer.classList.toggle('mobile-active');
      }

      // Filter Kategori pada Halaman Menu
      function filterMenu(category) {
        // Atur tombol filter aktif
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Saring elemen kartu menu di DOM
        const menuCards = document.querySelectorAll('.menu-card');
        menuCards.forEach(card => {
          const cardCategory = card.getAttribute('data-category');
          if (category === 'all' || cardCategory === category) {
            card.style.display = 'flex';
          } else {
            card.style.display = 'none';
          }
        });
      }

      // Simulasi Pemesanan Item (Mempengaruhi Dashboard Admin)
      function orderItem(itemName) {
        const item = menuData.find(m => m.name === itemName);
        
        if (item) {
          if (!item.available) {
            alert(`Maaf, stok untuk ${item.name} sedang habis hari ini.`);
            return;
          }
          
          totalSoldItems += 1;
          totalRevenue += item.price;
          
          alert(`Sukses memesan ${item.name}! Pesanan Anda sedang diproses oleh barista kami.`);
          updateAdminDashboard();
        }
      }

      // Validasi & Handler Form Kontak
      function handleFormSubmit(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        if (name && email && message) {
          alert(`Terima kasih, ${name}! Pesan/saran Anda telah berhasil dikirim ke manajemen NOKAT Cafe.`);
          document.getElementById('contactForm').reset();
        }
      }

      // Sistem Lightbox untuk Gallery Foto
      function openLightbox(imgSrc) {
        const lightbox = document.getElementById('galleryLightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        lightboxImg.src = imgSrc;
        lightbox.classList.add('show');
      }

      function closeLightbox() {
        const lightbox = document.getElementById('galleryLightbox');
        lightbox.classList.remove('show');
      }

      // Autentikasi Sederhana untuk Admin / Staff Area
      function promptAdminLogin() {
        if (isAdminLoggedIn) {
          switchTab('admin');
          return;
        }

        const password = prompt('Masukkan Kode Keamanan Staff NOKAT Cafe:');
        // Kunci akses default: nokat2026
        if (password === 'nokat2026') {
          isAdminLoggedIn = true;
          document.getElementById('adminNavTab').style.display = 'inline-block';
          document.getElementById('adminLoggedInAs').textContent = 'Barista / Admin';
          updateAdminDashboard();
          renderAdminTable();
          switchTab('admin');
          alert('Login Berhasil! Selamat bekerja, nikmati harimu.');
        } else if (password !== null) {
          alert('Kode keamanan salah. Akses ditolak.');
        }
      }

      function adminLogout() {
        isAdminLoggedIn = false;
        document.getElementById('adminNavTab').style.display = 'none';
        switchTab('home');
        alert('Anda telah keluar dari mode admin.');
      }

      // Memperbarui Metrik Finansial Sesi di Dashboard Admin
      function updateAdminDashboard() {
        document.getElementById('adminTotalSold').textContent = totalSoldItems;
        document.getElementById('adminTotalRevenue').textContent = 'Rp ' + totalRevenue.toLocaleString('id-ID');
      }

      // Render dan Manipulasi Status Stok Menu di Sisi Admin
      function renderAdminTable() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        menuData.forEach(item => {
          const tr = document.createElement('tr');
          
          tr.innerHTML = `
            <td><strong>${item.name}</strong></td>
            <td><span class="category-badge">${item.category.toUpperCase()}</span></td>
            <td>Rp ${item.price.toLocaleString('id-ID')}</td>
            <td>
              <span class="status-indicator ${item.available ? 'in-stock' : 'out-of-stock'}">
                ${item.available ? 'Tersedia' : 'Habis'}
              </span>
            </td>
            <td>
              <button class="action-toggle-btn" onclick="toggleStockStatus(${item.id})">
                Ubah Status
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function toggleStockStatus(itemId) {
        const item = menuData.find(m => m.id === itemId);
        if (item) {
          item.available = !item.available;
          renderAdminTable();
          // Opsional: Anda bisa menambahkan efek transisi visual jika dibutuhkan
        }
      }
    </script>
  </body>
</html>
